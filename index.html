<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>XO Wallet — Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f1424] text-white">
  <div class="mx-auto flex min-h-screen max-w-md flex-col px-5 pb-32 pt-3">
    <div class="mx-auto mb-4 h-1 w-10 rounded-full bg-white/20"></div>

    <!-- Top bar -->
    <div class="flex items-center justify-between">
      <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-pink-500 to-rose-600 shadow-lg shadow-rose-900/40">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
      </div>
      <div class="flex items-center gap-2">
        <button class="flex h-10 w-10 items-center justify-center rounded-full border border-white/10 bg-white/5">🔍</button>
        <button class="flex h-10 w-10 items-center justify-center rounded-full border border-white/10 bg-white/5">⏱</button>
      </div>
    </div>

    <!-- Balance ring -->
    <div class="relative mx-auto mt-6 flex h-72 w-72 items-center justify-center">
      <div class="absolute inset-0 rounded-full" style="border:4px solid #22c55e; box-shadow:0 0 30px rgba(34,197,94,.35), inset 0 0 20px rgba(34,197,94,.15);"></div>
      <div class="text-center">
        <div class="text-5xl font-semibold tracking-tight">€30,000</div>
        <div class="mt-1 text-xs uppercase tracking-widest text-white/40">Saldo total</div>
      </div>
    </div>

    <!-- Titular -->
    <div class="mt-6 flex items-start gap-3 rounded-2xl border border-white/10 bg-white/[0.04] p-4">
      <span class="mt-0.5 text-emerald-400">⚠️</span>
      <div class="text-sm">
        <div class="text-xs uppercase tracking-widest text-white/40">Titular de la cuenta</div>
        <div class="mt-1 font-semibold">Jose Maria Quinones Manzaneque</div>
      </div>
    </div>

    <!-- Activación de gasto -->
    <div class="mt-3 flex items-start gap-3 rounded-2xl border border-amber-400/30 bg-amber-400/10 p-4">
      <span class="mt-0.5 text-amber-400">⚠️</span>
      <div class="text-sm">
        <div class="font-semibold text-amber-300">Activación de gasto requerida</div>
        <div class="mt-1 text-white/80">Paga €52 para activar</div>
      </div>
    </div>

    <!-- Activos -->
    <div class="mt-5 space-y-3">
      <div class="flex items-center gap-3 rounded-2xl border border-white/5 bg-white/[0.04] p-4">
        <div class="flex h-11 w-11 items-center justify-center text-white font-bold text-sm" style="background:linear-gradient(135deg,#16a34a,#22c55e); clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);">XO</div>
        <div class="min-w-0 flex-1">
          <div class="font-semibold">XO Efectivo</div>
          <div class="text-xs text-white/50">€0.8594 <span class="text-rose-400">-0.1%</span></div>
        </div>
        <div class="text-right">
          <div class="text-sm font-bold text-emerald-400">34,910 XO</div>
          <div class="text-xs text-white/70">€30,000.00</div>
        </div>
      </div>

      <div class="flex items-center gap-3 rounded-2xl border border-white/5 bg-white/[0.04] p-4">
        <div class="flex h-11 w-11 items-center justify-center text-white font-bold text-sm" style="background:linear-gradient(135deg,#f59e0b,#f97316); clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);">₿</div>
        <div class="min-w-0 flex-1">
          <div class="font-semibold">Bitcoin</div>
          <div class="text-xs text-white/50">€64,733.81 <span class="text-rose-400">-1.4%</span></div>
        </div>
        <div class="text-right"><div class="text-sm font-bold text-amber-400">BTC</div></div>
      </div>

      <div class="flex items-center gap-3 rounded-2xl border border-white/5 bg-white/[0.04] p-4 opacity-50">
        <div class="flex h-11 w-11 items-center justify-center text-white font-bold text-sm" style="background:linear-gradient(135deg,#475569,#64748b); clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);">Ξ</div>
        <div class="min-w-0 flex-1">
          <div class="font-semibold">Ethereum</div>
          <div class="text-xs text-white/50">€2,431.20 <span class="text-rose-400">-0.8%</span></div>
        </div>
        <div class="text-right"><div class="text-sm font-bold text-slate-400">ETH</div></div>
      </div>
    </div>

    <!-- Dock -->
    <div class="fixed bottom-6 left-1/2 flex -translate-x-1/2 items-center gap-2 rounded-full border border-white/10 bg-white/[0.06] p-2 backdrop-blur-xl">
      <button class="flex h-12 w-12 items-center justify-center rounded-full bg-indigo-500">👛</button>
      <button class="flex h-12 w-12 items-center justify-center rounded-full bg-white/10">⇄</button>
      <button class="flex h-12 w-12 items-center justify-center rounded-full bg-white text-slate-900">$</button>
    </div>
  </div>
</body>
</html>
